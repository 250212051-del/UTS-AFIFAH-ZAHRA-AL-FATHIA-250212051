<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keranjang Belanja - TokoBuku.id</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

/* ================= HEADER ================= */

header{
    background:white;
    border-bottom:1px solid #ddd;
}

.top-header{
    display:flex;
    justify-content:flex-start;
    align-items:center;
    padding:15px 8%;
}

/* LOGO */
.logo{
    font-size:28px;
    font-weight:bold;
    margin-top:1%;;
    margin-left:40px;
}

/* NAVIGASI/MENU */
.navbar{
    display:flex;
    justify-content:center;
    gap:40px;
    padding:12px;
    border-top:1px solid #eee;
}

.navbar a{
    text-decoration:none;
    color:black;
}

.navbar a:hover{
    color:#003366;
}

/* ================= MAIN/LAYOUT KERANJANG ================= */

.container{
    width:90%;
    max-width:1200px;
    margin:40px auto;
}

.title{
    background:white;
    padding:15px;
    border:2px solid #003366;
    font-size:24px;
    font-weight:bold;
    margin-bottom:25px;
}

.cart-layout{
    display:flex;
    gap:25px;
    align-items:flex-start;
}

/* ================= LAYOUT UNTUK PRODUCT================= */

.cart-items{
    flex:2;
    background:white;
    padding:20px;
    border-radius:8px;
}

.product{
    display:flex;
    gap:20px;
    padding:20px 0;
    border-bottom:1px solid #ddd;
}

.product:last-child{
    border-bottom:none;
}

.product img{
    width:120px;
    height:150px;
    object-fit:cover;
    border:1px solid #ddd;
}

.product-info{
    flex:1;
}

.product-info h3{
    margin-bottom:8px;
}

.price{
    color:#003366;
    font-weight:bold;
    margin-bottom:10px;
}

.qty{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
}

.qty button{
    width:30px;
    height:30px;
    cursor:pointer;
    font-size:18px;
}

.remove{
    color:red;
    cursor:pointer;
    margin-left:10px;
}

/* ================= LAYOUT PEMBAYARAN ================= */

.summary{
    flex:1;
    background:white;
    padding:25px;
    border-radius:8px;
    border:2px solid #003366;
    position:sticky;
    top:20px;
}

.summary h2{
    margin-bottom:20px;
}

.summary-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:12px;
}

.total{
    border-top:2px dashed #999;
    padding-top:15px;
    margin-top:15px;
    font-size:22px;
    font-weight:bold;
}

.checkout-btn{
    width:100%;
    padding:15px;
    margin-top:20px;
    background:#003366;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.checkout-btn:hover{
    background:#001f40;
}

/* ================= FOOTER ================= */

footer{
    background:#003366;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:50px;
}

.footer-links{
    margin-bottom:10px;
}

.footer-links a{
    color:white;
    text-decoration:none;
    margin:0 10px;
}

@media(max-width:900px){

}
</style>
</head>
<body>

<!-- HEADER -->

<header>

    <!-- LOGO -->
        <div class="logo">JEWELRY.YNY</div>
<div class="top-header"></div>

<!-- NAVIGASI -->
    <nav class="navbar">
        <a href="index.html">HOME</a>
        <a href="profil.html">PROFIL</a>
         <a href="kontak.html">KONTAK</a>
        <a href="koleksi.html">KOLEKSI</a>
    </nav>

</header>

<!-- RINGKASAN KERANJANG -->

 <div class="container">
    <div class="title">
        RINGKASAN KERANJANG
    </div>
    <div class="cart-layout">

        <!-- tempat product yang akan dibeli muncul -->
        <div class="cart-items" id="cartItems"></div>

        <!-- kotak kanan jumlah harga semua barang jika dijumlahkan -->
        <div class="summary">
            <h2>Total Pesanan</h2>

            <!-- subtotal -->
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal">Rp 0</span>
            </div>

            <!-- pajak -->
            <div class="summary-row">
                <span>Pajak (5%)</span>
                <span id="tax">Rp 0</span>
            </div>

            <!-- pengiriman -->
            <div class="summary-row">
                <span>Pengiriman</span>
                <span>Rp 20.000</span>
            </div>

            <!-- total semua barang sudah dijumlahkan -->
            <div class="summary-row total">
                <span>TOTAL</span>
                <span id="grandTotal">Rp 0</span>
            </div>

            <button class="checkout-btn">
                PROSES PEMBAYARAN
            </button>

        </div>

    </div>

</div>

<!-- FOOTER -->

<footer>

    <div class="footer-links">
        <i class="fa-solid fa-envelope me-2"></i><a href="#">Gmail</a>
        <i class="fa-brands fa-instagram me-2"></i><a href="#">Instagram</a>
        <i class="fa-brands fa-facebook me-2"></i><a href="#">Facebook</a>
    </div>

    <p>&copy; 2026 Jewelry YNY. All Rights Reserved.</p>

</footer>

<!-- javascript internal -->
<script>
// 1. Ambil data dari localStorage
    let cart = JSON.parse(localStorage.getItem('keranjangBelanja')) || [];

    // 2. Fungsi Utama untuk menampilkan item dengan tombol +/-
    function renderCart() {
        const container = document.getElementById("cartItems");
        container.innerHTML = ""; 
        let subtotal = 0;

//  jika keranjang kosong total pesanan tetap nol TIDAK BERUBAH
        if (cart.length === 0) {
            container.innerHTML = "<p>Keranjang Anda masih kosong.</p>";
        } else { // jika tidak nol total pesana kan bertambah berdasrkan ini
            cart.forEach(item => {
                subtotal += item.harga * item.jumlah;
                container.innerHTML += ` 

                    <div class="product" style="display:flex; align-items:center; margin-bottom:15px; border-bottom:1px solid #ddd; padding-bottom:10px;">
                        <img src="${item.gambar}" alt="Produk" style="width:80px; margin-right:15px;">
                        <div class="product-info">
                            <h3>${item.nama}</h3>
                            <p class="price">Rp ${item.harga.toLocaleString('id-ID')}</p>
                        </div>

                        <div class="qty" style="margin-left:auto; display:flex; align-items:center; gap:10px;">
    <div style="display:flex; align-items:center; gap:5px;">
        <button onclick="changeQty('${item.nama}', -1)">-</button>
        <span>${item.jumlah}</span>
        <button onclick="changeQty('${item.nama}', 1)">+</button>
    </div>
    
    <span class="remove" onclick="removeItem('${item.nama}')" style="cursor:pointer; color:red; margin-left: 15px;">
        🗑️ Hapus
    </span>
</div>
                    </div>
                `;
            });
        }

        // Hitungan akhir
        const tax = subtotal * 0.05;
        const shipping = 20000;
        const total = subtotal + tax + shipping;

        document.getElementById("subtotal").innerText = "Rp " + subtotal.toLocaleString('id-ID');
        document.getElementById("tax").innerText = "Rp " + tax.toLocaleString('id-ID');
        document.getElementById("grandTotal").innerText = "Rp " + total.toLocaleString('id-ID');
    }

    // 3. Fungsi untuk menambah/mengurangi jumlah
    function changeQty(nama, delta) {
        let item = cart.find(x => x.nama === nama);
        if (item) {
            item.jumlah += delta;
            // Jika jumlah 0 atau kurang, hapus barang
            if (item.jumlah <= 0) {
                cart = cart.filter(x => x.nama !== nama);
            }
        }
        localStorage.setItem('keranjangBelanja', JSON.stringify(cart));
        renderCart();
    }

    // 4. Fungsi Hapus Item
    function removeItem(nama) {
        cart = cart.filter(item => item.nama !== nama);
        localStorage.setItem('keranjangBelanja', JSON.stringify(cart));
        renderCart();
    }

    renderCart();
</script>

</body>
</html>
